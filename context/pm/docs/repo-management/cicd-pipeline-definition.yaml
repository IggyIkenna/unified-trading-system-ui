meta:
  title: Unified Trading System — CI/CD Pipeline
  subtitle: "Three-tier branch model: feat/* → staging → main"
  version: "2026-03-13"
  source: docs/repo-management/cicd-pipeline-definition.yaml
  regenerate: python3 scripts/generate-cicd-diagram.py
swimlanes:
  - id: developer
    label: "Developer

      Workstation"
    color: "#f0f4ff"
    border: "#6c9bd2"
  - id: gha_repo
    label: "GHA

      (Per-Repo)"
    color: "#fff9e6"
    border: "#e8a838"
  - id: gha_pm
    label: "GHA

      (PM / Orchestrator)"
    color: "#f0fff4"
    border: "#5daf51"
  - id: sit
    label: "SIT

      (System Integration)"
    color: "#fff0f0"
    border: "#e05c5c"
  - id: cloud_build
    label: "Cloud Build

      / CodeBuild"
    color: "#f5f0ff"
    border: "#8e5cb4"
  - id: telegram
    label: "Telegram

      Alerts"
    color: "#f0f8ff"
    border: "#3395c6"
nodes:
  - id: dev_commit
    label: "Commit

      Conventional

      feat:/fix:/feat!:"
    type: start
    swimlane: developer
    col: 0
    branch: feat_star
    tooltip: "Developer writes code and commits using conventional commit syntax: feat:, fix:, chore:, feat!: (breaking)"
  - id: pass1_qg
    label: "Pass 1

      quality-gates.sh

      lint · tests · type · codex"
    type: process
    swimlane: developer
    col: 1.2
    branch: feat_star
    tooltip: "REQUIRED: bash scripts/quality-gates.sh — full run. Cannot be skipped."
  - id: quickmerge
    label: "Pass 2

      quickmerge.sh

      --agent"
    type: process
    swimlane: developer
    col: 2.5
    branch: feat_star
    tooltip:
      "bash scripts/quickmerge.sh 'msg' --agent — lightweight: lint+format+typecheck+codex only. Run AFTER Pass 1 is
      green."
  - id: breaking_decision
    label: "breaking

      change?"
    type: decision
    swimlane: gha_repo
    col: 4.9
    branch: feat_star
    actor: "GHA: feature-branch-to-staging.yml\nparses commit prefix\nPM/codex repos: scripted bypass (no SIT)"
    tooltip:
      "feat!: or BREAKING CHANGE: in commit body → staging path. fix:/feat:/chore: → main (hotfix) path. PM and codex
      repos bypass this via scripted workflows — they never enter the SIT lock cycle."
  - id: hotfix_pr
    label: "PR → main

      (hotfix path)"
    type: process
    swimlane: developer
    col: 5.9
    branch: main
    tooltip: "Non-breaking: fix:, feat:, chore: go directly to main via PR. No SIT required."
  - id: staging_locked_decision
    label: "staging

      locked?"
    type: decision
    swimlane: gha_repo
    col: 7.5
    branch: staging
    actor: "GHA: reads staging_status.locked\nin workspace-manifest.json"
    tooltip:
      staging_status.locked=true while SIT is running. PR creation proceeds; GitHub auto-merge queue holds PR until lock
      clears.
  - id: github_queue_hold
    label: "GitHub queue

      holds PR

      (staging-lock-gate)"
    type: process
    swimlane: gha_repo
    col: 8.7
    branch: staging
    tooltip: staging-lock-gate required status check returns PENDING while locked. PR auto-merges when lock clears.
  - id: version_gate_decision
    label: "repo version

      ≥ 1.0.0?"
    type: decision
    swimlane: gha_repo
    col: 9.9
    branch: staging
    actor: "GHA: staging-version-gate\nrequired status check"
    tooltip:
      "staging-version-gate required status check. Fails if pyproject.toml version < 1.0.0. Exemption:
      unified-trading-pm."
  - id: version_gate_fail
    label: "PR blocked

      until 1.0.0"
    type: end
    swimlane: gha_repo
    col: 13.4
    branch: feat_star
    tooltip: Repo must reach 1.0.0 (human approval) before it can enter staging. Pre-1.0.0 repos iterate on feat/* only.
  - id: qg_yml
    label: "quality-gates.yml

      required status check"
    type: process
    swimlane: gha_repo
    col: 2.5
    branch: feat_star
    tooltip:
      Runs on every push/PR. actionlint validates .github/workflows/*.yml. yamllint runs on YAML files.
      validate-cloudbuild.py + validate-buildspec.py check Cloud Build / CodeBuild YAML syntax.
  - id: plan_alignment
    label: "plan-alignment

      -agent.yml

      (advisory)"
    type: process
    swimlane: gha_repo
    col: 3.7
    branch: feat_star
    tooltip: Advisory PR comment if diff is out-of-scope for active PM plan todos. Never blocks merge.
  - id: merge_to_staging
    label: "Merge feat/*

      → staging"
    type: process
    swimlane: gha_repo
    col: 11.0
    branch: staging
    tooltip: "GitHub auto-merge fires after both required checks pass: staging-lock-gate (PASS) + staging-version-gate (PASS)."
  - id: merge_to_main_hotfix
    label: "Merge feat/*

      → main"
    type: process
    swimlane: gha_repo
    col: 6.3
    branch: main
    tooltip: Non-breaking PR auto-merges to main after quality-gates.yml passes.
  - id: semver_agent
    label: "semver-agent.yml

      Claude Haiku

      staging push only"
    type: process
    swimlane: gha_repo
    col: 12.2
    branch: staging
    tooltip:
      "Fires on push to staging (not main, not feat/*). Reads commit + __init__.py diff. Decides: feat!=minor,
      feat=minor, fix=patch. Pre-1.0.0: feat! bumps MINOR (never crosses to 1.0.0). Bumps pyproject.toml + CHANGELOG.
      Pushes [skip ci] commit."
  - id: conflict_detected
    label: "conflict

      free?"
    type: decision
    swimlane: gha_repo
    col: 16.0
    branch: staging
    actor: "GHA: gh api mergeable_state\n(staging-to-main.yml)"
    tooltip:
      "YES = no conflict, proceed to merge. NO = dirty/conflict, dispatch conflict-resolution-agent. staging-to-main.yml
      polls GitHub API mergeable_state. 'dirty' = merge conflict."
  - id: update_repo_version
    label: "update-repo-version

      .yml

      PM manifest"
    type: process
    swimlane: gha_pm
    col: 11.5
    branch: staging
    tooltip:
      Receives version-bump dispatch. Updates staging_versions[repo] + staging_commits[repo]. Dispatches
      dependency-update to direct dependents only (selective cascade based on manifest DAG).
  - id: dep_cascade
    label: "dependency-update

      cascade

      (selective DAG)"
    type: process
    swimlane: gha_pm
    col: 12.8
    branch: staging
    tooltip:
      Only direct dependents receive dispatch. Each dependent updates pyproject.toml constraint [skip ci]. Cascade
      propagates up DAG until no more dependents.
  - id: sit_gate_lock
    label: "sit-gate.yml

      locked=true

      SHAs recorded"
    type: process
    swimlane: gha_pm
    col: 14.5
    branch: staging
    tooltip:
      Sets staging_status.locked=true, locked_since=utcnow(). Records exact staging_commits SHAs. Dispatches
      staging-locked to all repos (queues pending PRs).
  - id: staging_to_main
    label: "staging-to-main

      .yml

      promote versions"
    type: process
    swimlane: gha_pm
    col: 19.0
    branch: main
    tooltip:
      Triggered by staging-validated dispatch. Promotes staging_versions → versions. Appends to main_commits.history
      (keep last 5). Clears staging_commits + staging_status.locked. Merges staging → main with [skip ci].
  - id: sit_unlock_fail
    label: "sit-unlock.yml

      locked=false

      'SIT failed'"
    type: process
    swimlane: gha_pm
    col: 17.5
    branch: staging
    tooltip: Triggered by sit-failed dispatch. Clears lock. Engineers can push fixes immediately.
  - id: manifest_sync
    label: "manifest-sync.yml

      → codex dispatch"
    type: process
    swimlane: gha_pm
    col: 7.0
    branch: main
    tooltip:
      Triggered on push to PM main touching workspace-manifest.json or plans/**. POSTs repository_dispatch
      type=manifest-updated to unified-trading-codex.
  - id: rules_alignment
    label: "rules-alignment

      -agent.yml

      PM"
    type: process
    swimlane: gha_pm
    col: 8.2
    branch: main
    tooltip:
      Triggered on PM push touching plans/active/**. Reads changed plan files, validates each new constraint has a
      cursor rule .mdc file, creates missing rules.
  - id: plan_lifecycle
    label: "Plan created

      active plans/

      agent or human"
    type: process
    swimlane: gha_pm
    col: 1.8
    branch: agent
    actor: "PM main push triggers cascade:\nrules-alignment + codex-sync\nHuman signs off before impl"
    tooltip:
      "Plans in unified-trading-pm/plans/active/ are the canonical context for all agent decisions. When a plan is
      created or updated: (1) codex-sync-agent updates unified-trading-codex, (2) rules-alignment-agent creates cursor
      rules from plan constraints, (3) Telegram notifies team for review. Agents read active plans before any
      implementation. PM/codex repos follow this path directly (no SIT)."

  - id: overnight_orchestrator
    label: "overnight-agent

      -orchestrator.yml

      cron 0 1 UTC"
    type: process
    swimlane: gha_pm
    col: 0
    branch: agent
    tooltip:
      "Nightly: dispatches agent-audit.yml to T0→T1→T2→T3 in tier order. Each tier waits for prior via GHA needs graph.
      Retry up to 3x with prior_context. Telegram morning summary."
  - id: conflict_agent
    label: "conflict-resolution

      -agent.yml

      Claude proposes fix"
    type: process
    swimlane: gha_pm
    col: 16.0
    branch: agent
    tooltip:
      Triggered by merge-conflict-detected dispatch. Clones repo+PM+codex. Reads AGENTS.md+plans. Claude extracts
      conflicts, proposes resolution. Runs QG (advisory). Opens resolution PR. Never self-merges.
  - id: version_bump_main
    label: "version-bump.yml

      main push

      (hotfix)"
    type: process
    swimlane: gha_pm
    col: 5.5
    branch: main
    tooltip:
      Fires on push to main for hotfix path. Bumps pyproject.toml patch/minor. Dispatches version-bump to PM. PM updates
      manifest.versions[repo].
  - id: sit_debounce
    label: "smoke-test-gate

      .yml

      10-min debounce"
    type: process
    swimlane: sit
    col: 12.0
    branch: staging
    tooltip:
      "GHA concurrency group sit-staging with cancel-in-progress: true. Sleeps 600s. New staging push cancels and
      restarts clock. After 10-min quiet: proceeds with ALL repos in staging_commits SHA set."
  - id: hotfix_mode_decision
    label: "hotfix

      mode?"
    type: decision
    swimlane: sit
    col: 13.2
    branch: staging
    actor: "SIT: reads staging_status.hotfix_mode\nor manifest sit_level=abbreviated"
    tooltip:
      staging_status.hotfix_mode=true if quickmerge --hotfix was used. Also applies if all repos have
      sit_level=abbreviated in manifest.
  - id: abbreviated_sit
    label: "Abbreviated SIT

      tests/abbreviated/

      < 2 min"
    type: process
    swimlane: sit
    col: 14.5
    branch: staging
    tooltip: Schema checks only. Used for hotfix path and PM/codex repos (sit_level=abbreviated).
  - id: full_sit_code
    label: "Layer 3a

      Code Tests

      < 10 min"
    type: process
    swimlane: sit
    col: 15.8
    branch: staging
    tooltip: Static tests, no live services. Contract validation, schema parity, cassette checks.
  - id: full_sit_deploy
    label: "Layer 3b

      Deployment Tests

      docker-compose mock"
    type: process
    swimlane: sit
    col: 17.0
    branch: staging
    tooltip:
      "Tests requiring docker-compose mock stack. Integration layer 3b/3c. Credential-free: CLOUD_PROVIDER=local
      CLOUD_MOCK_MODE=true."
  - id: sit_pass_decision
    label: "SIT

      pass?"
    type: decision
    swimlane: sit
    col: 18.2
    branch: staging
    actor: "SIT runner: test suite exit code\n(smoke-test-gate.yml)"
    tooltip: "Pass: dispatch staging-validated to PM → staging-to-main. Fail: dispatch sit-failed to PM → sit-unlock."
  - id: cloud_build_router
    label: "cloud-build-router

      .yml

      QG-passed dispatch"
    type: process
    swimlane: cloud_build
    col: 3.0
    branch: feat_star
    tooltip:
      "Receives qg-passed dispatch from quality-gates.yml. Routes to GCP project based on branch: feat/*→uts-dev,
      staging→uts-staging, main→uts-prod."
  - id: build_dev
    label: "Cloud Build

      uts-dev-ikenna

      tag: {semver}-{branch}"
    type: process
    swimlane: cloud_build
    col: 4.2
    branch: feat_star
    tooltip:
      Feature branch builds. Libraries → Python wheel. Services/APIs/UIs → Docker image. Tags are immutable — never
      overwritten.
  - id: build_staging
    label: "Cloud Build

      uts-staging-ikenna

      tag: {semver}-staging"
    type: process
    swimlane: cloud_build
    col: 12.5
    branch: staging
    tooltip: Staging builds triggered after QG passes on staging push. Image tagged {semver}-staging.
  - id: build_prod
    label: "Cloud Build

      uts-prod-ikenna

      tag: {semver}"
    type: process
    swimlane: cloud_build
    col: 20.5
    branch: main
    tooltip:
      Production builds triggered after staging-to-main promotes. Image tagged {semver} (clean, no suffix). Tags
      immutable.
  - id: codebuild_aws
    label: "CodeBuild (AWS)

      buildspec.aws.yaml

      tag: {semver}"
    type: process
    swimlane: cloud_build
    col: 21.8
    branch: main
    tooltip: AWS CodeBuild runs buildspec.aws.yaml for AWS-hosted services. validate-buildspec.py checks syntax pre-push.
  - id: tg_conflict_detected
    label: "⚠️ Conflict

      $REPO staging→main

      agent dispatched"
    type: notification
    swimlane: telegram
    col: 16.5
    branch: agent
    tooltip: Sent by staging-to-main.yml when mergeable_state=dirty. TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID in step env.
  - id: tg_conflict_working
    label: "🔧 Conflict agent

      working on

      $REPO..."
    type: notification
    swimlane: telegram
    col: 17.8
    branch: agent
    tooltip: Sent immediately by conflict-resolution-agent.yml at start. Lets team know agent is active.
  - id: tg_conflict_done
    label: "✅ Resolution PR

      ready: <url>

      QG: pass/warn"
    type: notification
    swimlane: telegram
    col: 19.0
    branch: agent
    tooltip: Sent by conflict-resolution-agent.yml at end. Includes PR URL, files resolved, QG exit code.
  - id: tg_sit_locked
    label: "⏳ SIT locked

      staging testing

      in progress"
    type: notification
    swimlane: telegram
    col: 14.5
    branch: staging
    tooltip: Sent by sit-gate.yml when lock is set.
  - id: tg_sit_pass
    label: "✅ SIT passed

      promoting

      staging→main"
    type: notification
    swimlane: telegram
    col: 21.5
    branch: main
    tooltip: Sent by staging-to-main.yml after successful promotion.
  - id: tg_sit_fail
    label: "❌ SIT failed

      staging unlocked

      for fixes"
    type: notification
    swimlane: telegram
    col: 20.2
    branch: staging
    tooltip: Sent by sit-unlock.yml after SIT failure.
  - id: tg_overnight
    label: "🌙 Overnight

      T0-T3 summary

      pass/fail counts"
    type: notification
    swimlane: telegram
    col: 1.2
    branch: agent
    tooltip: Sent by overnight-agent-orchestrator.yml after all tiers complete.
  - id: tg_major_bump
    label: "🚨 MAJOR bump

      $REPO awaiting

      human /approve"
    type: notification
    swimlane: telegram
    col: 11.0
    branch: staging
    tooltip:
      Sent by request-major-bump.yml. Creates GitHub Issue (major-bump-pending label). Human comments /approve or
      /reject.
  - id: tg_cassette_drift
    label: "⚠️ Cassette drift

      $REPO schema

      changed"
    type: notification
    swimlane: telegram
    col: 2.5
    branch: agent
    tooltip:
      Nightly cassette-drift-check.yml. Re-records cassettes vs real APIs, diffs vs committed YAMLs. Creates GitHub
      Issue on drift.
  - id: tg_plan_ready
    label: "📋 Plan ready

      human review

      Gate 1 of 2"
    type: notification
    swimlane: telegram
    col: 3.5
    branch: agent
    tooltip:
      "GATE 1 (of 2): Sent when a plan is created/updated in plans/active/. Human must review and approve before agent
      begins implementation. Reply /approve-plan [name]. This is the first of only two human touchpoints in the entire
      pipeline."
  - id: tg_cloud_build_fail
    label: "🔴 Build failed

      $REPO $BRANCH

      ⚠️ pending impl"
    type: notification
    swimlane: telegram
    col: 4.8
    branch: both
    tooltip:
      "NOT YET IMPLEMENTED (tracked: add-cloud-build-fail-alert in cicd_audit_remediation plan). Will be sent when GCP
      Cloud Build returns non-zero exit. Currently Cloud Build failures are silent — GHA dispatches fire-and-forget."
  - id: tg_merge_ready
    label: "🔀 Agent PR ready

      human review

      Gate 2 of 2"
    type: notification
    swimlane: telegram
    col: 6.0
    branch: agent
    tooltip:
      "GATE 2 (of 2): Sent when any agent-opened PR is ready for merge. Human must review and approve before auto-merge
      fires. Reply /approve-merge [PR#]. This is the second and final human touchpoint. Conflict resolution PRs never
      auto-merge regardless."
  - id: api_health_preflight
    label: "Claude API

      pre-flight

      healthy?"
    type: decision
    swimlane: gha_pm
    col: 14.8
    branch: agent
    actor: "timeout 30 claude --print 'ping'\nclassifies 401 / 429 / 503\nbefore clone or install"
    tooltip:
      "Pre-flight check run at start of every agent workflow BEFORE clone/install. 401=key invalid (no retry, rotate
      immediately), 429=rate limited (retry 3x with 30s/60s/120s backoff), 503=service down (exit 0, graceful skip — no
      pipeline failure). Overnight orchestrator runs this ONCE before dispatching T0 tier to prevent 65 agent-audit jobs
      failing silently when Claude is down. Each agent uses a dedicated key: ANTHROPIC_API_KEY_OVERNIGHT, _CONFLICT,
      _RULES, _SEMVER, _CODEX_SYNC — falls back to shared ANTHROPIC_API_KEY. Quota exhaustion in overnight audit does
      NOT block conflict-resolution agent."
  - id: tg_api_key_failure
    label: "🔑 API key

      invalid / Claude

      unreachable"
    type: notification
    swimlane: telegram
    col: 14.0
    branch: agent
    tooltip:
      "Sent on any classified Claude CLI error: 401 (key invalid/expired — rotate immediately, no retry), 429 (rate
      limited — 3x backoff fired), 503 (service down — graceful skip, retry at next scheduled run), or job timeout.
      Includes ERROR_CLASS + repo + branch + which dedicated key was in use. State-transition-only:
      claude-api-health-monitor.yml (cron every 15 min) detects healthy→degraded and fires alert once, not on every
      poll."
connections:
  - from: dev_commit
    to: pass1_qg
    branch: feat_star
  - from: pass1_qg
    to: quickmerge
    label: Pass 1 ✓
    branch: feat_star
  - from: quickmerge
    to: breaking_decision
    branch: feat_star
  - from: breaking_decision
    to: hotfix_pr
    label: "fix:/feat:/chore:"
    branch: main
    outcome: "no"
  - from: breaking_decision
    to: staging_locked_decision
    label: "feat!:"
    branch: staging
    outcome: "yes"
  - from: staging_locked_decision
    to: github_queue_hold
    label: locked
    branch: staging
    style: dashed
    outcome: "yes"
  - from: staging_locked_decision
    to: version_gate_decision
    label: not locked
    branch: staging
    outcome: "no"
  - from: github_queue_hold
    to: version_gate_decision
    label: lock clears
    branch: staging
    style: dashed
  - from: version_gate_decision
    to: version_gate_fail
    label: < 1.0.0
    branch: feat_star
    outcome: "no"
  - from: version_gate_decision
    to: merge_to_staging
    label: ≥ 1.0.0
    branch: staging
    outcome: "yes"
  - from: hotfix_pr
    to: merge_to_main_hotfix
    branch: main
  - from: quickmerge
    to: qg_yml
    label: PR opened
    branch: feat_star
    style: dashed
  - from: qg_yml
    to: plan_alignment
    branch: feat_star
  - from: qg_yml
    to: cloud_build_router
    label: qg-passed dispatch
    branch: feat_star
    style: dashed
  - from: merge_to_staging
    to: semver_agent
    label: staging push
    branch: staging
  - from: merge_to_main_hotfix
    to: version_bump_main
    label: main push
    branch: main
    style: dashed
  - from: semver_agent
    to: update_repo_version
    label: version-bump dispatch
    branch: staging
    style: dashed
  - from: update_repo_version
    to: dep_cascade
    branch: staging
  - from: update_repo_version
    to: build_staging
    label: qg-passed routed
    branch: staging
    style: dashed
  - from: version_bump_main
    to: update_repo_version
    label: version-bump dispatch
    branch: main
    style: dashed
  - from: merge_to_main_hotfix
    to: manifest_sync
    label: PM push
    branch: main
    style: dashed
  - from: plan_lifecycle
    to: rules_alignment
    label: rules cascade
    branch: agent
    style: dashed
  - from: plan_lifecycle
    to: manifest_sync
    label: codex cascade
    branch: agent
    style: dashed
  - from: plan_lifecycle
    to: tg_plan_ready
    label: notify team
    branch: agent
    style: dashed
  - from: staging_to_main
    to: manifest_sync
    label: PM main push
    branch: main
    style: dashed
  - from: conflict_agent
    to: tg_merge_ready
    label: PR opened
    branch: agent
    style: dashed
  - from: build_dev
    to: tg_cloud_build_fail
    label: on failure
    branch: both
    style: dashed
  - from: build_staging
    to: tg_cloud_build_fail
    label: on failure
    branch: both
    style: dashed
  - from: build_prod
    to: tg_cloud_build_fail
    label: on failure
    branch: both
    style: dashed
  - from: overnight_orchestrator
    to: tg_overnight
    branch: agent
    style: dashed
  - from: overnight_orchestrator
    to: tg_cassette_drift
    label: "nightly drift-check"
    branch: agent
    style: dashed
  - from: conflict_detected
    to: conflict_agent
    label: conflict!
    branch: agent
    style: dashed
    outcome: "no"
  - from: conflict_agent
    to: tg_conflict_working
    branch: agent
    style: dashed
  - from: conflict_agent
    to: tg_conflict_done
    branch: agent
    style: dashed
  - from: conflict_detected
    to: tg_conflict_detected
    label: notify team
    branch: agent
    style: dashed
    outcome: "no"
  - from: dep_cascade
    to: sit_debounce
    label: "staging push

      triggers SIT"
    branch: staging
    style: dashed
  - from: sit_debounce
    to: sit_gate_lock
    label: lock dispatch
    branch: staging
    style: dashed
  - from: sit_gate_lock
    to: tg_sit_locked
    branch: staging
    style: dashed
  - from: sit_debounce
    to: hotfix_mode_decision
    label: proceed
    branch: staging
  - from: hotfix_mode_decision
    to: abbreviated_sit
    label: "--hotfix flag"
    branch: staging
    outcome: "yes"
  - from: hotfix_mode_decision
    to: full_sit_code
    label: full SIT
    branch: staging
    outcome: "no"
  - from: abbreviated_sit
    to: sit_pass_decision
    branch: staging
  - from: full_sit_code
    to: full_sit_deploy
    branch: staging
  - from: full_sit_deploy
    to: sit_pass_decision
    branch: staging
  - from: sit_pass_decision
    to: conflict_detected
    label: "pass

      staging-validated"
    branch: main
