slug: regulatory
title: Regulatory Umbrella
tldr: The Regulatory Umbrella exists for firms whose activity would otherwise require their own {{term:fca|FCA}} authorisation. Odum's permissions carry the regulatory load — or the EU-regulated affiliate's {{term:aifm|AIFM}} permissions do, where activity sits outside UK scope. Firms that are already independently authorised, or that operate unregulated activity, don't need an umbrella; they run adjacent sub-advisory or commercial services engagements on the same operating stack. Engagement shape — Fund or {{term:sma|SMA}}, branded as you or as Odum, single mandate or multi-vehicle — resolves at the second call.
frame: Firms running trading activity that want operational cover without seeking direct {{term:fca|FCA}} authorisation operate under Odum's permissions. Odum Research Ltd holds live FCA authorisation (FRN 975797 — verifiable on the FCA register at register.fca.org.uk) and operates compliance, {{term:mlro|MLRO}}, and supervisory reporting internally. Where the planned activity sits outside UK regulatory scope, an EU-regulated affiliate with alternative-investment-fund-manager ({{term:aifm|AIFM}}) and fund-administration permissions carries the EU-side mandate. The shape of the engagement — Fund or {{term:sma|SMA}}, one vehicle or N, branded as you or as Odum, UK or EU path — is a matter of fit, not of product constraint. Odum operates the {{term:venue}}-facing onboarding work (exchange KYC, mandate paperwork, API-key provisioning, sub-account setup) in every shape, regardless of whose name is on the account. Scoped venue API keys are held in Secret Manager with no withdrawal authority, ever; key scope is execute-plus-read where Odum or the EU affiliate is IM of record and runs execution, read-only-plus-read-transaction where your firm is IM and executes. The regulatory-relevant question is not who holds the legal account or the venue-facing keys but who is IM of record — that party holds trading discretion and carries the corresponding authorisation requirement.
sections:
  - title: Engagement options — four axes of flexibility
    body: Where your entity sits with Odum resolves on four independent axes. Each is set once at onboarding and revisable at renewal. The briefing walks you through the axes; the second call maps them against your specifics.
    bullets:
      - "Structure axis — Fund (pooled vehicle with share classes, third-party custodian, subscriptions and redemptions via Odum portal) or {{term:sma|SMA}} (you hold your own venue accounts in your own entity name). Odum operates the venue-facing onboarding work in both structures — exchange KYC, mandate paperwork, API-key provisioning, sub-account setup — so the legal account-holder differs but the operational lift sits with Odum regardless. Multi-fund and multi-SMA are supported natively: one umbrella entity can operate N vehicles under a single mandate."
      - Scope axis — Odum Research Ltd under UK FCA permissions where the activity sits in scope, or an EU-regulated affiliate with {{term:aifm|AIFM}} and fund-administration permissions where it does not. Jurisdiction resolves against your planned activity and client base, not bundled upfront.
      - Counterparty-facing axis — who is IM of record on the mandate (Odum Research Ltd, the EU affiliate, or your firm as {{term:ar|appointed representative}} under Odum's principal permissions) and whether a sub-advisor arrangement layers on top (your firm as sub-advisor to Odum, or Odum as sub-advisor to your firm). Sub-advisor structures are a standard legal form for regulated and unregulated activity alike; the axis is independent from activity character. Branding visibility — who foregrounds on client collateral — layers on top again.
      - Activity axis — regulated investment activity (under Odum's FCA or the EU affiliate's AIFM permissions) or unregulated activity (crypto spot, most sports fixtures, prediction markets, certain DeFi swaps) where an investment-management-shaped engagement can still be provided commercially. A single umbrella entity can span both without a second onboarding.
    bodyAfter: "The four axes are orthogonal. A typical shape might be: one UK-FCA-scoped SMA for {{term:tradfi|TradFi}} equities plus one EU-{{term:aifm|AIFM}}-wrapped pooled fund for crypto spot, branded with Odum visible as IM across both — or any other combination. The second call resolves which combination fits your situation."
  - title: Regulatory scope — what Odum is permitted to oversee
    body: Odum Research Ltd's FCA permissions (FRN 975797) cover the core investment-management activity stack — arranging deals in investments, advising on investments, making arrangements with a view to transactions in investments, and dealing as agent where the mandate requires it — across the professional-client category (with elective-professional and retail reachable where in scope). The live permissions list is on the FCA register at register.fca.org.uk — search for Odum Research Ltd or FRN 975797 — and is reproduced on request for counterparties drafting their own disclosures.
    bodyAfter: The Umbrella operates your firm as an {{term:ar|appointed representative}} or the equivalent structural vehicle for fund-style clients under Odum's principal permissions. The regulated activities your firm can run are a strict subset of Odum's permissions; the second call walks your planned activity against the permissions list and resolves scope fit. Activities outside FCA scope route to the EU-affiliate path or, if unregulated, to a commercial investment-management-shaped engagement — both covered in the next two sections. Odum does NOT advise firms on obtaining their own direct FCA authorisation; if direct authorisation is your endgame, Odum is the wrong counterparty for that project.
  - title: Category coverage — where we are IM, where we umbrella, where we decline
    body: Coverage splits by category, each with its own regulatory character. The matrix resolves against your actual planned flow at the second call — a counterparty whose scope crosses multiple categories typically operates a combined mandate with legs on both the UK and EU rails.
    bullets:
      - "{{term:tradfi|TradFi}} (equities, futures, listed options, corporate bonds, FX) — UK-regulated investment activity. Odum Research Ltd acts as investment manager directly under FCA permissions. Fund or SMA both supported."
      - "{{term:cefi|CeFi}} crypto derivatives (perps, dated futures, options on regulated venues) — regulated-activity character depends on instrument and counterparty domicile. Often covered under Odum's FCA permissions for professional clients; otherwise wrapped via the EU-{{term:aifm|AIFM}} path. Fund or SMA both supported."
      - CeFi crypto spot — not UK-regulated investment activity for most tokens. Odum acts in an investment-management-shaped commercial capacity for SMA engagements; alternatively, the EU-{{term:aifm|AIFM}} fund structure converts the activity into regulated {{term:aif|AIF}}-manager activity in the EU. Fund wrapper is the cleaner path where counterparties want regulatory cover on crypto spot.
      - "{{term:defi|DeFi}} (on-chain swaps, flash-loan arbitrage, DEX strategies) — unregulated in the UK. EU-AIFM fund wrapper is the regulatory path where cover is required; SMA-style commercial arrangement is available where the counterparty does not require a regulated wrapper."
      - Sports fixtures — a betting / gambling activity under UK FSMA carve-outs, not investment activity. Odum Research Ltd does not act as FCA investment manager for sports-betting strategies; the EU affiliate can wrap a sports-betting strategy into a regulated AIF structure where that fits the counterparty's client base and domicile. Most sports engagements sit as commercial SMA-style arrangements.
      - Prediction markets (Polymarket, Kalshi) — regulatory character depends on venue jurisdiction; not UK-regulated investment activity today. EU AIF wrapper is the regulated path where wrapping is desired; otherwise commercial SMA-style arrangement.
    bodyAfter: No activity gets declined without a named reason and a pointer to the right structure; no activity gets hedged into a grey middle — the fit-check is explicit.
  - title: Fund or SMA — structural options and multi-vehicle mandates
    body: "The structural choice resolves on isolation, share-class mechanics, and custody posture:"
    bullets:
      - "SMA — venue accounts are in your own entity name, funded directly with the venue. Odum operates the venue onboarding work (exchange KYC, paperwork, API-key provisioning). The execution-key scope Odum holds follows the mandate shape: execute-plus-read where Odum (or the EU affiliate) is IM of record and runs execution, read-only-plus-read-transaction where your firm is IM and executes under its own authorisation or AR status. No withdrawal authority under either configuration, ever. Preferred where you want full isolation, bespoke venue selection, or mandate-specific risk parameters."
      - Fund (pooled) — share classes in a fund vehicle whose assets sit with a qualified third-party custodian (Copper for crypto; equivalent regulated custodians for {{term:tradfi|TradFi}} and on-chain positions). The custodian holds fund assets under its own regulatory permissions, with venue withdrawal addresses whitelisted to custodian-controlled endpoints — so execution keys carry no withdrawal-risk exposure regardless of who holds them operationally. A regulated fund administrator runs {{term:nav|NAV}} accounting and subscription / redemption processing; you subscribe and redeem via the Odum portal (API + client dashboard). Odum operates the venue onboarding and, in the default configuration where Odum or the EU affiliate is {{term:aifm|AIFM}} of record, the execution rail. Preferred where share-class mechanics, third-party custody, or cross-border domicile are load-bearing for your client base.
      - Who controls the account = IM of record — that is the regulatory-relevant test. The legal account-holder (your entity for SMA; the fund vehicle for Fund) and the venue-facing operational party (whichever side runs execution under the mandate shape) are structural facts; the regulated-activity analysis keys off trading discretion — which sits with whoever is IM of record. If you are IM under regulated activity, you need appropriate authorisation per the mandate-shape section (direct FCA, or AR status under Odum where the shape supports it); if Odum is IM, Odum's authorisation applies; for unregulated activity neither party needs FCA authorisation.
      - Multi-vehicle — one umbrella entity can operate N funds, N SMAs, or a mix under a single mandate. Each sub-vehicle has its own share class (if pooled) or SMA partition, reported and supervised inside the same surface.
    bodyAfter: 'Odum Research Ltd — the investment manager — never holds principal under either structure. Fund custody sits with the third-party custodian; SMA custody sits with you. The Umbrella overlay is regulatory and reporting only; no capital ever moves through Odum. Structure also drives the regulatory-permissions surface: SMA (managing investments for one client at a time) sits under the standard FCA "managing investments" permission, which Odum''s UK authorisation covers directly and which {{term:ar|AR}} status under Odum reaches; Fund ({{term:aif|AIF}} / collective investment vehicle) sits under {{term:aifm|AIFM}} activity, requiring UK full-scope AIFM permission, UK small-registered-AIFM status, or an external AIFM (the EU-regulated affiliate for EU-domiciled funds). AR status generally does not reach full-scope AIFMD activity, so a client firm intending to be AIFM of a UK Fund needs its own direct AIFM authorisation — not the typical umbrella-prospect profile. The Fund path under the umbrella most commonly routes Odum or the EU affiliate as AIFM of record, with the client firm as distributor, sub-advisor, or investment advisor feeding recommendations. The permissions annex at the second call lays out which UK fund-manager permissions Odum holds and which fund wrappers run on the UK rail versus the EU rail.'
  - title: Who faces whom — mandate shapes and financial-promotion disclosures
    body: "The counterparty-facing axis decomposes into two sub-axes that combine freely. (1) Who is IM of record — Odum Research Ltd (or the EU affiliate), your firm as {{term:ar|appointed representative}} under Odum's principal permissions, or your firm under its own direct FCA authorisation. (2) Whether a sub-advisor arrangement is layered on top — optional and bidirectional. Five shapes cover the combinations that resolve in practice, each with the template financial-promotion disclosure that goes on client-facing materials. Not every shape is strictly a Regulatory Umbrella shape: the umbrella specifically means Odum's (or the EU affiliate's) permissions are what enables the activity — true for Shapes 1, 2, and 3. Shape 4 is a sub-advisory services engagement with an already-authorised firm; Shape 5 is commercial services for unregulated activity. Both are adjacent relationships supported on the same operating stack and often bundle alongside umbrella legs inside a multi-leg mandate, but neither needs an umbrella — if you already hold your own FCA authorisation and run your own execution and custody, Odum's permissions aren't load-bearing and the umbrella framing doesn't apply."
    bullets:
      - 'Shape 1 (umbrella) — Odum IM, your firm as advisor or introducer. Your firm originates the client or provides investment ideas; Odum decides, executes, and carries regulatory responsibility. Disclosure: "Investment management is provided by Odum Research Ltd, authorised and regulated by the Financial Conduct Authority (FRN 975797)."'
      - 'Shape 2 (umbrella) — Odum IM, your firm as sub-advisor. Your firm feeds investment recommendations (signals, model outputs, portfolio-construction input) under a sub-advisory agreement; Odum as IM retains discretion and regulatory responsibility. Works for regulated and unregulated activity. Disclosure: the Shape 1 statement plus "[Your Firm] acts as sub-advisor to Odum Research Ltd in respect of [scope of sub-advisory mandate]."'
      - 'Shape 3 (umbrella) — Your firm IM under the AR model, Odum as authorising principal. Your firm is customer-facing and keeps its branding; Odum appears in the mandatory regulatory disclosure as the regulated principal. AR status requires FCA registration of your firm as an appointed representative of Odum, which typically adds 4-12 weeks of onboarding lead time. Chosen where your firm specifically wants to be customer-facing IM under your own brand; where speed-to-live is the priority, Shape 1 or Shape 2 (Odum as IM) reaches live faster with the same economic and operational outcome. Disclosure: "[Your Firm] is an appointed representative of Odum Research Ltd, which is authorised and regulated by the Financial Conduct Authority (FRN 975797)."'
      - 'Shape 4 (adjacent, not umbrella) — Your firm IM under its own direct FCA authorisation, Odum as sub-advisor. You are IM of record, face clients, run your own execution, and arrange your own custody. Odum supplies signals, execution support, research, or portfolio-construction input under a sub-advisory agreement. Because you are already authorised, Odum''s permissions are not load-bearing — this is a sub-advisory services engagement, not an umbrella. AR status under Odum does not apply here; an AR cannot be IM of record on its own mandate. For unregulated activity the same shape works with no authorisation required on either side. Disclosure (regulated): your firm''s own IM disclosure plus "Odum Research Ltd (FRN 975797) acts as sub-advisor to [Your Firm] in respect of [scope]."'
      - Shape 5 (adjacent, not umbrella) — Commercial services arrangement for unregulated activity. The activity sits outside the FCA perimeter so no regulatory cover is needed or provided. Both firms operate as commercial counterparties on the same operating stack. Disclosures reflect the non-regulated character of the activity; FCA references appear only where the engagement has a regulated leg in parallel.
    bodyAfter: 'Umbrella vs. adjacent relationships: the Regulatory Umbrella proper means Odum''s FCA authorisation (or the EU affiliate''s AIFM authorisation) is what enables the activity — Shapes 1, 2, and 3. Shapes 4 and 5 are adjacent services relationships on the same operating stack but Odum''s permissions are not load-bearing in either — Shape 4 because your firm is independently authorised, Shape 5 because the activity is unregulated. If your firm is already authorised AND runs its own execution AND arranges its own custody, you do not need the umbrella; Shape 4 is the right commercial frame. Regulatory-gate rule underneath all shapes: any party providing a regulated activity in the UK needs authorisation for what they do — either direct FCA permissions or AR status under a principal. Shape 2 regulated: your firm''s sub-advisory leg needs "advising on investments" permission, typically achieved by taking AR status under Odum for the advisory leg. Shape 3 regulated: your firm is AR under Odum, Odum''s principal permissions cover, no extra authorisation needed on your side. Shape 4 regulated: your firm needs its own direct FCA authorisation as IM — AR status does not work for this shape because an AR cannot be IM of record. Unregulated variants of Shapes 2, 4, and 5 operate as commercial arrangements with no authorisation requirement. Shapes are set per leg at mandate signing and revisable at renewal; a single umbrella entity may combine umbrella legs (Shapes 1-3) with adjacent legs (Shape 4 or 5) inside one mandate.'
  - title: UK FCA path and EU regulated-affiliate path
    body: The Umbrella runs on two parallel regulatory rails. Combined mandates — one umbrella entity with a UK leg and an EU leg — are common and supported through the same reporting surface.
    bullets:
      - UK FCA path — Odum Research Ltd acts as principal; your firm operates under Odum's FCA permissions (FRN 975797). Activity must sit within Odum's scope — TradFi equities / futures / listed options, qualifying crypto derivatives, other activities per the permissions list. Financial-promotion approval and transaction reporting run through Odum UK compliance.
      - EU path — an EU-regulated affiliate of Odum holds an {{term:aifm|AIFM}} licence and fund-administration permissions. The affiliate acts as AIFM for EU-domiciled {{term:aif|AIF}} structures, widening coverage into categories outside UK scope (crypto spot, DeFi, sports, prediction markets) and serving counterparties whose client base prefers an EU wrapper. Public copy references the affiliate as "an EU-regulated affiliate"; the specific entity is named at the second call.
    bodyAfter: Activities that fit neither path — direct retail financial promotion in a jurisdiction neither entity is licensed for, regulated-activity categories outside both permission sets — are declined at the fit-check with a named reason, not hedged.
  - title: Onboarding — five workstreams in parallel
    body: "Five workstreams run in parallel, each with a stated Odum owner and a stated dependency on you:"
    bullets:
      - "Legal scoping and agreements — compliance team owns; you provide planned activity detail and corporate structure. Output: appointed-representative agreement, investment-management agreement, or sub-fund documentation, scoped to the activities you run, keyed to the branding mode (A / B / C) you pick."
      - "KYC/AML and suitability — MLRO owns; you provide key-person KYC, source-of-funds evidence, and onboarding diligence on your own clients. Output: MLRO sign-off on firm and key personnel."
      - "Compliance and risk-tolerance profiling — compliance lead owns; you provide policy and procedure documentation, plus a risk-tolerance profile per sub-client or mandate. Output: compliance monitoring plan and risk register."
      - "Mandate drafting and venue setup — operations plus engineering own; you provide venue preferences. Odum runs the venue-facing onboarding work (exchange KYC, API-key provisioning, sub-account setup) in every shape, regardless of whose name is on the account; the scope of keys Odum holds (execute-plus-read vs read-only-plus-read-transaction) is set by the mandate shape picked in the prior section. Output: venue onboarding manifest and reporting-scope sign-off."
      - "Reporting setup — engineering owns; you sign off on the reporting entitlement surface and the set of share-class or sub-mandate identifiers. Output: operating reporting surface live for your firm."
    bodyAfter: Parallel execution, not sequential. The reader leaves with a mental model of what onboarding feels like and what they are responsible for.
  - title: Operating model once live
    body: The default umbrella shape is Shape 1 or Shape 2 — Odum as IM of record on the mandate, your firm as advisor, introducer, or sub-advisor. Odum runs execution, carries regulatory responsibility, and operates compliance monitoring, supervisory checks, transaction reporting, and {{term:best-execution|best-execution}} evidence on the mandate. Onboarding under Shapes 1 and 2 does not require FCA AR registration — you sign an advisory or sub-advisory agreement with Odum, venue setup runs in parallel, and the mandate goes live as soon as venue onboarding completes. The AR route (Shape 3) is available where your firm specifically wants to be customer-facing IM under your own brand, but FCA AR registration typically adds 4-12 weeks of lead time; where speed-to-live is the priority Shape 1 or Shape 2 reaches live materially faster with the same economic and operational outcome. On the EU rail the analogous default has the EU affiliate as {{term:aifm|AIFM}} of record with your firm as advisor or sub-advisor — same fast-onboarding posture. You retain strategic and commercial control of the business across all shapes; regulatory operations run through Odum. Multi-fund and multi-SMA structures are supported natively — each sub-vehicle with its own share class (if pooled) or standalone SMA partition, reported and supervised inside one surface.
  - title: Supervisory artefacts — what you get monthly and quarterly
    body: "Umbrella clients receive a defined set of supervisory artefacts on a published cadence, produced directly from the operating stack:"
    bullets:
      - Monthly {{term:nav|NAV}} and position reports per sub-fund or SMA, reconciled against venue balances.
      - Quarterly performance attribution, breaking {{term:pnl|P&L}} out by strategy, factor, and execution quality where relevant.
      - Monthly compliance monitoring reports — breach log, near-miss log, remediation status.
      - Transaction reporting artefacts under {{term:mifid|MiFID II}} (UK rail) or the equivalent EU regime under the AIFM affiliate (EU rail), generated from fills on your scoped venue keys.
      - "{{term:best-execution|Best-execution}} evidence packs per venue per period."
      - Annual compliance certifications and audit-trail access for your own auditors and regulators-in-scope.
  - title: Reporting surface — inherited from the operating stack
    body: Regulatory Umbrella clients get the full Odum reporting and analytics tool-set the same way IM clients do — positions, exposures, {{term:pnl|P&L}} attribution, performance breakdowns, reconciliation, audit trail, MiFID II and transaction reporting, supervisory artefacts. Not a separate regulatory-reporting product; a partition of the operating system, entitlement-filtered to your view.
    bodyAfter: Venue API keys stay in Odum's Secret Manager for the duration of the engagement and are revocable by the account-holder at any time. Key scope follows the mandate shape — execute-plus-read where Odum (or the EU affiliate) is IM of record and runs execution, read-only-plus-read-transaction where your firm is IM and executes under its own authorisation or AR status. In every configuration the reporting surface ingests position, order, and fill data from the venues and produces sub-partition breakdowns per fund, SMA, sub-client, or sub-mandate under the same entitlement-filtered view.
  - title: Template agreements and FCA-permissions annex
    body: Odum provides template agreements at the second call, keyed to the mandate shape (the five shapes from the prior section) and the structural choice (Fund / SMA / multi-vehicle). The set covers the investment-management agreement (for mandates where Odum is IM of record), the sub-advisory agreement in both directions (your firm as sub-advisor to Odum, or Odum as sub-advisor to your firm), the appointed-representative agreement (where your firm operates as AR under Odum's principal permissions), and the commercial services agreement (for unregulated-activity engagements). Each template carries the mandatory regulatory disclosures, the operating-model clauses (scoped API keys, reporting surface, supervisory artefacts), and the commercial clauses (commitment floor, termination, fee schedule) as modular sections — bespoke drafting happens at the specifics, not the bones. The FCA-permissions summary is reproduced as an annex, linking to the live FCA register entry at register.fca.org.uk (FRN 975797) for standing verification. Where the mandate runs on the EU rail, an analogous annex covers the EU affiliate's AIFM and fund-administration scope.
  - title: Commitment
    body: "Twelve-month minimum engagement. Onboarding costs are real — legal review, compliance setup, MLRO onboarding, venue provisioning, reporting setup — and the floor recovers them. Pricing is per block: regulatory umbrella reporting, reporting core, execution layer, venue packs, instrument-type packs. Multi-vehicle engagements carry per-additional-vehicle scope uplifts rather than N-times-the-base. Numbers are walked through at the second call."
  - title: Related paths
    body: If you are looking to allocate capital to Odum-run strategies rather than cover your own activity, see the Investment Management briefing at /briefings/investment-management — the reporting surface is shared because the underlying operating stack is one. If you additionally want access to Odum's research and promote layer on your own strategies under the umbrella, see the DART Full Pipeline briefing at /briefings/dart-full.
keyMessages:
  - Four axes of flexibility — Structure (Fund / SMA / multi-vehicle) × Scope (UK FCA / EU AIFM) × Counterparty-facing (IM-of-record + optional sub-advisor arrangement, bidirectional) × Activity (regulated / unregulated). Orthogonal and mixable inside one engagement.
  - Odum Research Ltd holds live FCA permissions (FRN 975797, verifiable on the FCA register at register.fca.org.uk) and operates compliance, MLRO, and supervisory reporting internally — not outsourced oversight repackaged.
  - An EU-regulated affiliate with AIFM and fund-administration permissions covers activity outside UK FCA scope — crypto spot, DeFi, sports, prediction markets — either standalone or combined with the UK leg in one umbrella mandate.
  - "Category coverage is explicit: TradFi direct-IM under FCA; CeFi derivatives mostly FCA, otherwise EU AIFM; CeFi spot / DeFi / sports / prediction via EU AIFM fund wrapper or unregulated commercial SMA arrangement."
  - Regulatory Umbrella proper = Shapes 1, 2, 3 (Odum's permissions are load-bearing). Shapes 4 and 5 are adjacent services relationships on the same operating stack but not umbrella engagements — Shape 4 because your firm is independently authorised, Shape 5 because the activity is unregulated. If you're already authorised, run your own execution and arrange your own custody, you don't need the umbrella; Shape 4 is the right frame. Financial-promotion disclosure template provided per shape.
  - Fund or SMA, one vehicle or N — multi-fund and multi-SMA structures are native. Each sub-vehicle has its own share class or partition inside one surface. Odum Research Ltd never holds principal under any structure.
  - Odum operates the venue-facing onboarding work (exchange KYC, API-key provisioning, sub-account setup) in every shape, regardless of whose name is on the account. Scoped keys held in Secret Manager with no withdrawal authority, ever; key scope (execute-plus-read vs read-only-plus-read-transaction) follows the mandate shape.
  - Who controls the account = IM of record — that is the regulatory-relevant test, not legal account-holder or venue-facing party. Legal account-holder (your entity for SMA, fund vehicle for Fund) and operational party are structural facts; authorisation requirement keys off IM-of-record status plus activity character.
  - Template investment-management agreement, sub-advisor agreement, and FCA-permissions annex provided at the second call — modular sections cover branding, structure, operating model, and commercials.
  - Twelve-month minimum engagement; onboarding has five parallel workstreams each with a stated Odum owner.
nextCall: The 45-minute second call walks your specific activity against Odum's FCA permissions (verifiable on the FCA register) and the EU affiliate's AIFM scope, resolves the four axes against your situation (structure, scope jurisdiction, mandate shape including any sub-advisor arrangement, activity character), maps the five onboarding workstreams, and hands you the template IMA, sub-advisor agreement, AR agreement, or commercial services agreement keyed to the shape you pick.
