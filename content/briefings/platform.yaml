slug: platform
title: DART — overview
tldr: "{{term:dart|DART}} (Data Analytics, Research & Trading) is the platform we use internally — packaged for clients. It splits into two commercial paths. This page is a router only; depth lives in the two path briefings."
frame: "Use this page to pick a path, then read that briefing end-to-end. Signals-In — your models stay upstream; you send instructions. Full pipeline — you also use our research, backtest, and promote layers on the same stack. Everything else (instruction schema, compatibility matrix, maturity, metered research, exclusivity) is spelled out in /briefings/dart-signals-in and /briefings/dart-full — not duplicated here."
sections:
  - title: Which DART path fits
    body: "The fork is single-axis: do you need Odum's research and promote surfaces, or only execution, risk, allocation, and reporting on instructions you already generate? If the latter, you are Signals-In. If the former, you are Full pipeline. Upgrading from Signals-In to Full pipeline later is a formal commercial re-scope — if you will need research during the engagement, pick Full pipeline now."
    bullets:
      - "Signals-In — /briefings/dart-signals-in — eight-field instruction schema, venue/instrument fit, lifecycle, what this path does not include."
      - "Full pipeline — /briefings/dart-full — research surface, maturity ladder, promotion, metered research, exclusivity tiers."
    appliesTo: both
  - title: Commitment and scope (both paths)
    body: "Twelve-month minimum engagement. Scope is venue packs, chain packs, and instrument-type packs; full-pipeline engagements add research breadth. Pricing is per block. Numbers on the second call."
    appliesTo: both
  - title: Not DART?
    body: "For Investment Management (we run capital for you), Odum Signals (signals out to your stack), or the Regulatory Umbrella, return to the hub and open that card — those paths are outside the DART fork."
    appliesTo: both
keyMessages:
  - DART is one platform; the commercial product picks which surfaces you use.
  - This overview does not replace the path briefings — it routes to them.
  - Signals-In vs Full pipeline is a load-bearing scope boundary, not a feature toggle.
  - Twelve-month minimum; scope follows venue, chain, instrument, and (if full pipeline) research packs.
nextCall: "If you already know your path, book against /briefings/dart-signals-in or /briefings/dart-full. If you are still choosing, a 45-minute call maps Signals-In vs Full pipeline against your upstream and whether research is in scope."
cta:
  label: Book 45-minute call
  href: /contact
