# Canonical pre-commit config for TypeScript/React UI repos.
# Template SSOT: unified-trading-pm/scripts/pre-commit-templates/
# Rollout: bash unified-trading-pm/scripts/propagation/rollout-pre-commit-configs.sh
# Setup: pre-commit install --install-hooks

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Conventional commit validation (feat:/fix:/chore:/docs:/refactor:/test:/ci:)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Prettier - uses the project's own Prettier from node_modules (single version source)
  - repo: local
    hooks:
      - id: prettier
        name: Format with Prettier
        entry: pnpm exec prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, json, css, markdown, yaml]

  # ESLint - uses the project's own ESLint 9 (flat config)
  - repo: local
    hooks:
      - id: eslint
        name: Lint with ESLint
        entry: pnpm exec eslint --fix
        language: system
        types_or: [javascript, jsx, ts, tsx]

  # Branch drift check - blocks commit if you're behind origin
  - repo: local
    hooks:
      - id: check-branch-drift
        name: Check branch drift (are you behind origin?)
        entry: bash -c 'HOOK="${WORKSPACE_ROOT:-$(cd "$(git rev-parse --show-toplevel)/.." &&
          pwd)}/unified-trading-pm/scripts/hooks/check-branch-drift.sh"; [ -f "$HOOK" ] && bash "$HOOK" || exit 0'
        language: system
        always_run: true
        pass_filenames: false

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$ # Don't strip trailing spaces in markdown (can be intentional)
      - id: end-of-file-fixer
        exclude: ^\.prettier-cache$
      - id: check-yaml
        exclude: ^context/
      - id: check-json
        exclude: ^context/
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
