name: request-major-bump

# Human-initiated request for a MAJOR version bump (including 0.x.x -> 1.0.0).
# This workflow ONLY creates a GitHub Issue + sends Telegram alert.
# The actual version bump happens when a human comments /approve on the issue
# (handled by major-bump-issue-handler.yml).
#
# DO NOT use this to immediately bump versions -- the bump requires /approve on the issue.
# NO AGENT may trigger this on behalf of a user without explicit human instruction.

on:
  workflow_dispatch:
    inputs:
      proposed_version:
        description: "New MAJOR version (e.g. 1.0.0 or 2.0.0)"
        required: true
        type: string
      reason:
        description: "Why this is a MAJOR bump (e.g. removed /v1/orders endpoint)"
        required: true
        type: string
      approver:
        description: "GitHub handle of requester (defaults to actor)"
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  request-major-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Validate version and read current
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail

          PROPOSED="${{ inputs.proposed_version }}"
          REQUESTER="${{ inputs.approver || github.actor }}"
          REPO_NAME="${{ github.event.repository.name }}"

          # Validate MAJOR.MINOR.PATCH format
          if ! echo "$PROPOSED" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: version must be MAJOR.MINOR.PATCH format, got: $PROPOSED"
            exit 1
          fi

          # Validate MAJOR >= 1
          PROPOSED_MAJOR=$(echo "$PROPOSED" | cut -d. -f1)
          if [ "$PROPOSED_MAJOR" -lt 1 ]; then
            echo "ERROR: proposed_version must have MAJOR >= 1 (got $PROPOSED)"
            echo "For 0.x.x bumps, semver-agent.yml handles those automatically."
            exit 1
          fi

          # Read current version from pyproject.toml
          CURRENT=$(grep -oP '^version\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' pyproject.toml 2>/dev/null || echo "0.0.0")
          echo "Current version: $CURRENT"
          echo "Proposed version: $PROPOSED"

          # Validate it IS a MAJOR increase
          CURRENT_MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          if [ "$PROPOSED_MAJOR" -le "$CURRENT_MAJOR" ] && [ "$CURRENT_MAJOR" -gt 0 ]; then
            echo "ERROR: $PROPOSED is not a MAJOR increase over current $CURRENT"
            exit 1
          fi

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "proposed=$PROPOSED" >> "$GITHUB_OUTPUT"
          echo "requester=$REQUESTER" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issue for approval
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          CURRENT="${{ steps.validate.outputs.current }}"
          PROPOSED="${{ steps.validate.outputs.proposed }}"
          REQUESTER="${{ steps.validate.outputs.requester }}"
          REPO="${{ steps.validate.outputs.repo }}"
          REASON="${{ inputs.reason }}"
          COMMIT_SHA="${{ github.sha }}"

          METADATA_JSON="{\"repo\":\"${REPO}\",\"proposed_version\":\"${PROPOSED}\",\"current_version\":\"${CURRENT}\",\"staging_branch\":\"staging\",\"staging_commit\":\"${COMMIT_SHA}\",\"reason\":\"${REASON}\"}"

          ISSUE_BODY="## Major Version Bump Approval Required

          Repo: ${REPO}
          Current version: ${CURRENT}
          Proposed version: ${PROPOSED}
          Reason: ${REASON}
          Requested by: @${REQUESTER}

          ---

          ## How to Approve or Reject

          Comment /approve on this issue to approve the MAJOR bump.
          Comment /reject on this issue to reject it and close without bumping.

          Only users with write access to this repo may approve or reject.

          Approving this will bump pyproject.toml to ${PROPOSED} on the staging branch.
          The PM workspace-manifest.json staging_versions will also be updated.
          This does NOT touch main.

          ---

          <!-- major-bump-metadata
          ${METADATA_JSON}
          -->"

          # Try with label first, fall back to without label
          ISSUE_URL=$(gh issue create \
            --repo "${GH_ORG}/${REPO}" \
            --title "[MAJOR BUMP PENDING] ${REPO}: ${CURRENT} to ${PROPOSED}" \
            --body "$ISSUE_BODY" \
            --label "major-bump-pending" \
            2>&1 || echo "")

          if [ -z "$ISSUE_URL" ] || ! echo "$ISSUE_URL" | grep -q "http"; then
            echo "Label-based issue creation failed. Retrying without label..."
            ISSUE_URL=$(gh issue create \
              --repo "${GH_ORG}/${REPO}" \
              --title "[MAJOR BUMP PENDING] ${REPO}: ${CURRENT} to ${PROPOSED}" \
              --body "$ISSUE_BODY" \
              2>&1 || echo "")
          fi

          # HARD FAIL if issue creation failed -- do not silently continue
          if [ -z "$ISSUE_URL" ] || ! echo "$ISSUE_URL" | grep -q "http"; then
            echo "::error::Failed to create GitHub issue for MAJOR bump approval."
            echo "::error::ISSUE_URL='$ISSUE_URL' -- expected a valid URL."
            echo "::error::Check: (1) GH_PAT has issues:write scope, (2) 'major-bump-pending' label exists on $REPO"
            exit 1
          fi

          echo "Issue URL: $ISSUE_URL"
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

      - name: Send Telegram alert
        env:
          PROPOSED: ${{ steps.validate.outputs.proposed }}
          CURRENT: ${{ steps.validate.outputs.current }}
          REPO: ${{ steps.validate.outputs.repo }}
          ISSUE_URL: ${{ steps.create-issue.outputs.issue_url }}
          REQUESTER: ${{ steps.validate.outputs.requester }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Validate Telegram secrets are present -- FAIL if missing
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN secret is not set on this repo."
            echo "::error::Fix: gh secret set TELEGRAM_BOT_TOKEN --repo ${GH_ORG}/${REPO}"
            exit 1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::TELEGRAM_CHAT_ID is not set (checked vars.TELEGRAM_CHAT_ID and secrets.TELEGRAM_CHAT_ID)."
            echo "::error::Fix: gh variable set TELEGRAM_CHAT_ID --repo ${GH_ORG}/${REPO} --body '<chat-id>'"
            exit 1
          fi

          # Validate issue URL is not empty
          if [ -z "$ISSUE_URL" ] || [ "$ISSUE_URL" = "unknown" ]; then
            echo "::error::ISSUE_URL is empty or unknown -- issue creation failed silently."
            exit 1
          fi

          MSG="MAJOR BUMP REQUESTED -- Repo: ${REPO} -- Version: ${CURRENT} to ${PROPOSED} -- Requested by: @${REQUESTER} -- Approve: ${ISSUE_URL}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "disable_web_page_preview=true")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Telegram send failed (HTTP $HTTP_CODE) -- issue was created at $ISSUE_URL but notification failed"
          else
            echo "Telegram alert sent successfully"
          fi

      - name: Summary
        run: |
          echo "## Major Bump Request Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | \`${{ steps.validate.outputs.repo }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Current version | \`${{ steps.validate.outputs.current }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Proposed version | \`${{ steps.validate.outputs.proposed }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Requested by | @${{ steps.validate.outputs.requester }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Issue | ${{ steps.create-issue.outputs.issue_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next step: Comment /approve on the issue to proceed with the version bump." >> $GITHUB_STEP_SUMMARY

  notify-failure:
    name: Telegram — Major Bump Request Failure
    needs: [request-major-bump]
    if: always() && needs.request-major-bump.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram failure alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && echo "No bot token — skipping Telegram notify" && exit 0
          [ -z "$TELEGRAM_CHAT_ID" ] && echo "No chat ID — skipping Telegram notify" && exit 0
          MSG="❌ Major bump request FAILED — ${{ github.event.repository.name }} (proposed: ${{ inputs.proposed_version }}). View: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" -d "text=${MSG}" -d "disable_web_page_preview=true" || true
