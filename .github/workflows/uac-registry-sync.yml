# Triggered by UAC commits to main/staging — regenerates UI reference data.
# Template lives in: unified-trading-pm/scripts/workflow-templates/uac-registry-sync.yml
# Target repo: unified-trading-system-ui
name: UAC Registry Sync

on:
  repository_dispatch:
    types: [uac-registry-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout unified-trading-system-ui
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout unified-api-contracts
        uses: actions/checkout@v4
        with:
          repository: IggyIkenna/unified-api-contracts
          path: _uac
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install UAC
        run: |
          cd _uac
          pip install -e .

      - name: Generate UI reference data
        run: |
          python _uac/scripts/generate_ui_reference_data.py \
            --output lib/registry/ui-reference-data.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet lib/registry/ui-reference-data.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="auto/uac-registry-sync-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add lib/registry/ui-reference-data.json
          git commit -m "chore: sync UI reference data from UAC ${{ github.event.client_payload.version }}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        id: branch

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create \
            --title "chore: sync UI reference data from UAC" \
            --body "Auto-generated by UAC registry sync workflow.

          Source: unified-api-contracts ${{ github.event.client_payload.version }}
          Trigger: repository_dispatch from UAC commit" \
            --head "${{ steps.branch.outputs.branch }}" \
            --base main
