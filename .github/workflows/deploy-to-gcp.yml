name: Deploy to GCP

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Cloud Run region"
        required: false
        default: europe-west4

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT: central-element-323112
  SERVICE_NAME: odum-portal
  PORT: "3000"
  USER_MGMT_API_URL: https://user-management-api-1060025368044.us-central1.run.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source . \
            --region ${{ github.event.inputs.region }} \
            --port ${{ env.PORT }} \
            --allow-unauthenticated \
            --project ${{ env.GCP_PROJECT }} \
            --set-env-vars "NEXT_PUBLIC_USER_MGMT_API_URL=${{ env.USER_MGMT_API_URL }}"

      - name: Verify health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ github.event.inputs.region }} \
            --project ${{ env.GCP_PROJECT }} \
            --format 'value(status.url)')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/")
          echo "Health check: ${SERVICE_URL} -> ${STATUS}"
          [ "$STATUS" = "200" ] || { echo "Health check failed"; exit 1; }

  notify:
    if: always()
    needs: [deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ICON=$( [ "$DEPLOY_RESULT" = "success" ] && echo "✅" || echo "❌" )
          TEXT="${ICON} *Deploy unified-trading-system-ui* | ${DEPLOY_RESULT}"
          TEXT="${TEXT}"$'\n'"Region: ${{ github.event.inputs.region }} | Branch: \`${{ github.ref_name }}\`"
          TEXT="${TEXT}"$'\n'"By: ${{ github.actor }}"
          TEXT="${TEXT}"$'\n'"[view run](${RUN_URL})"
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${TEXT}" \
              -d parse_mode="Markdown" || true
          fi
