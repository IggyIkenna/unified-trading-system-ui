# Triggered by UAC commits to main/staging — regenerates OpenAPI TypeScript types.
# UIC (unified-internal-contracts) is now unified_api_contracts.internal (sub-module of unified-api-contracts).
# Template lives in: unified-trading-pm/scripts/workflow-templates/uic-openapi-sync.yml
# Target repo: unified-trading-system-ui
name: UIC OpenAPI Sync

on:
  repository_dispatch:
    types: [uac-openapi-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout unified-trading-system-ui
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout unified-api-contracts
        uses: actions/checkout@v4
        with:
          repository: IggyIkenna/unified-api-contracts
          path: _uac
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install openapi-typescript
        run: npm install -g openapi-typescript

      - name: Find OpenAPI spec
        id: spec
        run: |
          SPEC_PATH=$(find _uac -name "*.openapi.json" -o -name "*.openapi.yaml" | head -1)
          if [ -z "$SPEC_PATH" ]; then
            SPEC_PATH="_reference/versa-execution-analytics-ui/context/api-contracts/openapi/unified-trading-system.openapi.json"
          fi
          echo "path=$SPEC_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate TypeScript types
        run: |
          npx openapi-typescript "${{ steps.spec.outputs.path }}" \
            --output lib/types/api-generated.ts

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet lib/types/api-generated.ts || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="auto/uic-openapi-sync-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add lib/types/api-generated.ts
          git commit -m "chore: sync OpenAPI types from UAC ${{ github.event.client_payload.version }}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        id: branch

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create \
            --title "chore: sync OpenAPI TypeScript types from UAC (internal contracts)" \
            --body "Auto-generated by UIC OpenAPI sync workflow.

          Source: unified-api-contracts (internal) ${{ github.event.client_payload.version }}
          Trigger: repository_dispatch from UAC commit" \
            --head "${{ steps.branch.outputs.branch }}" \
            --base main
