name: major-bump-issue-handler

# Handles /approve and /reject comments on GitHub Issues with the "major-bump-pending" label.
#
# When a user with write access comments /approve:
#   1. Parses repo/version metadata from issue body
#   2. Bumps pyproject.toml version on the staging branch
#   3. Dispatches version-bump to unified-trading-pm (updates staging_versions)
#   4. Sends Telegram success alert
#   5. Closes issue as completed
#
# When a user with write access comments /reject:
#   1. Sends Telegram rejection alert
#   2. Closes issue as not_planned (no version bump)
#
# STAGING ONLY: version bumps NEVER touch main.
# NO SELF-APPROVAL: agents cannot comment /approve on issues.
#
# SSOT: unified-trading-pm/scripts/workflow-templates/major-bump-issue-handler.yml
# Rollout: bash unified-trading-pm/scripts/workflow-templates/rollout-workflow-templates.sh

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  handle-major-bump:
    runs-on: ubuntu-latest
    # Only run on issues (not PRs) with the major-bump-pending label
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'major-bump-pending')
    steps:
      - name: Detect command
        id: cmd
        run: |
          BODY=$(cat << 'BODYEOF'
          ${{ github.event.comment.body }}
          BODYEOF
          )
          TRIMMED=$(echo "$BODY" | tr '[:upper:]' '[:lower:]' | tr -d ' \t\r\n')
          if echo "$TRIMMED" | grep -q "^/approve"; then
            echo "action=approve" >> "$GITHUB_OUTPUT"
          elif echo "$TRIMMED" | grep -q "^/reject"; then
            echo "action=reject" >> "$GITHUB_OUTPUT"
          else
            echo "action=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify commenter write access
        if: steps.cmd.outputs.action != 'none'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail

          COMMENTER="${{ github.event.comment.user.login }}"
          REPO="${{ github.event.repository.name }}"
          ORG="${{ github.repository_owner }}"

          echo "Verifying $COMMENTER has write access to $ORG/$REPO..."
          HTTP_STATUS=$(curl -s -o /tmp/perm.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${ORG}/${REPO}/collaborators/${COMMENTER}/permission")

          if [ "$HTTP_STATUS" = "404" ]; then
            echo "ERROR: $COMMENTER is not a collaborator on $ORG/$REPO"
            exit 1
          fi

          PERM=$(python3 -c "import json; d=json.load(open('/tmp/perm.json')); print(d.get('permission','none'))" 2>/dev/null || echo "none")
          echo "Permission: $PERM"

          if [[ "$PERM" != "write" && "$PERM" != "maintain" && "$PERM" != "admin" ]]; then
            echo "ERROR: $COMMENTER has '$PERM' access -- write/maintain/admin required to approve/reject"
            # Add a comment on the issue explaining the failure
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${ORG}/${REPO}/issues/${{ github.event.issue.number }}/comments" \
              -d "{\"body\":\"Cannot process /${{ steps.cmd.outputs.action }}: @${COMMENTER} has '${PERM}' access. Write/maintain/admin required.\"}" || true
            exit 1
          fi
          echo "$COMMENTER has $PERM access -- verified"

      - name: Parse issue metadata
        if: steps.cmd.outputs.action != 'none'
        id: meta
        run: |
          set -euo pipefail

          # Extract JSON from <!-- major-bump-metadata ... --> block in issue body
          ISSUE_BODY=$(cat << 'ISSUEEOF'
          ${{ github.event.issue.body }}
          ISSUEEOF
          )

          METADATA=$(echo "$ISSUE_BODY" | python3 -c "
          import sys, re, json
          body = sys.stdin.read()
          m = re.search(r'<!--\s*major-bump-metadata\s*(\{.*?\})\s*-->', body, re.DOTALL)
          if not m:
              print('{}')
          else:
              try:
                  d = json.loads(m.group(1).strip())
                  print(json.dumps(d))
              except Exception:
                  print('{}')
          " 2>/dev/null || echo "{}")

          REPO=$(echo "$METADATA" | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); print(d.get('repo',''))" 2>/dev/null || echo "")
          VERSION=$(echo "$METADATA" | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); print(d.get('proposed_version',''))" 2>/dev/null || echo "")
          CURRENT=$(echo "$METADATA" | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); print(d.get('current_version','unknown'))" 2>/dev/null || echo "unknown")
          REASON=$(echo "$METADATA" | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); print(d.get('reason',''))" 2>/dev/null || echo "")

          if [ -z "$REPO" ] || [ -z "$VERSION" ]; then
            echo "ERROR: Could not parse repo/version from issue metadata"
            echo "Parsed metadata: $METADATA"
            exit 1
          fi

          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "Parsed: repo=$REPO version=$VERSION current=$CURRENT"

      - name: Bump pyproject.toml on staging branch
        if: steps.cmd.outputs.action == 'approve'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ steps.meta.outputs.repo }}
          VERSION: ${{ steps.meta.outputs.version }}
          APPROVER: ${{ github.event.comment.user.login }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          echo "Bumping $REPO to v$VERSION on staging (approved by $APPROVER)"

          # Clone the target repo at staging branch
          git clone --depth=1 --branch staging \
            "https://${GH_TOKEN}@github.com/${ORG}/${REPO}.git" /tmp/target-repo
          cd /tmp/target-repo

          # Bump version in pyproject.toml
          python3 - <<PYEOF
          import re
          with open("pyproject.toml") as f:
              content = f.read()
          new_content = re.sub(
              r'^(version\s*=\s*")[^"]+(")',
              r'\g<1>${VERSION}\g<2>',
              content,
              flags=re.MULTILINE
          )
          with open("pyproject.toml", "w") as f:
              f.write(new_content)
          print(f"Updated pyproject.toml version to ${VERSION}")
          PYEOF

          git config user.email "semver-agent@ci.local"
          git config user.name "Semver Agent (major-bump-issue-handler)"
          git add pyproject.toml
          if git diff --staged --quiet; then
            echo "WARNING: No change in pyproject.toml -- version may already be ${VERSION}"
            exit 0
          fi
          git commit -m "chore: bump version to ${VERSION} [major-bump approved by ${APPROVER}]"
          git push origin staging
          echo "Bumped $REPO pyproject.toml to $VERSION on staging"

      - name: Dispatch version-bump to unified-trading-pm
        if: steps.cmd.outputs.action == 'approve'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ steps.meta.outputs.repo }}
          VERSION: ${{ steps.meta.outputs.version }}
          APPROVER: ${{ github.event.comment.user.login }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          echo "Dispatching version-bump to PM: $REPO -> $VERSION"

          HTTP_STATUS=$(curl -s -o /tmp/dispatch.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${ORG}/unified-trading-pm/dispatches" \
            -d "{\"event_type\":\"version-bump\",\"client_payload\":{\"repo\":\"${REPO}\",\"version\":\"${VERSION}\",\"branch\":\"staging\",\"commit_sha\":\"major-bump-approved\",\"approved_by\":\"${APPROVER}\"}}")

          if [ "$HTTP_STATUS" = "204" ]; then
            echo "Dispatched version-bump to unified-trading-pm: $REPO -> $VERSION"
          else
            echo "ERROR: HTTP $HTTP_STATUS dispatching to unified-trading-pm"
            cat /tmp/dispatch.json || true
            exit 1
          fi

      - name: Send Telegram notification
        if: steps.cmd.outputs.action != 'none'
        env:
          ACTION: ${{ steps.cmd.outputs.action }}
          REPO: ${{ steps.meta.outputs.repo }}
          VERSION: ${{ steps.meta.outputs.version }}
          APPROVER: ${{ github.event.comment.user.login }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          TELEGRAM_BOT_TOKEN_PROD: ${{ secrets.TELEGRAM_BOT_TOKEN_PROD }}
          TELEGRAM_BOT_TOKEN_STAGING: ${{ secrets.TELEGRAM_BOT_TOKEN_STAGING }}
          TELEGRAM_BOT_TOKEN_DEV: ${{ secrets.TELEGRAM_BOT_TOKEN_DEV }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_PROD: ${{ vars.TELEGRAM_CHAT_ID_PROD || vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_STAGING: ${{ vars.TELEGRAM_CHAT_ID_STAGING || vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_DEV: ${{ vars.TELEGRAM_CHAT_ID_DEV || vars.TELEGRAM_CHAT_ID }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          case "$GITHUB_REF_NAME" in
            main|live-defi-rollout) BOT_TOKEN="${TELEGRAM_BOT_TOKEN_PROD:-${TELEGRAM_BOT_TOKEN:-}}"; CHAT_ID="${TELEGRAM_CHAT_ID_PROD:-}" ;;
            staging)                BOT_TOKEN="${TELEGRAM_BOT_TOKEN_STAGING:-${TELEGRAM_BOT_TOKEN:-}}"; CHAT_ID="${TELEGRAM_CHAT_ID_STAGING:-}" ;;
            *)                      BOT_TOKEN="${TELEGRAM_BOT_TOKEN_DEV:-${TELEGRAM_BOT_TOKEN:-}}"; CHAT_ID="${TELEGRAM_CHAT_ID_DEV:-}" ;;
          esac
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            if [ "$ACTION" = "approve" ]; then
              MSG="Major bump APPROVED: ${REPO} -> v${VERSION} on staging (by @${APPROVER})%0A${ISSUE_URL}"
            else
              MSG="Major bump REJECTED: ${REPO} -> v${VERSION} (by @${APPROVER})%0A${ISSUE_URL}"
            fi
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d "chat_id=${CHAT_ID}&text=${MSG}&disable_web_page_preview=false" || true
            echo "Telegram notification sent"
          else
            echo "Telegram secrets not configured -- skipping notification"
          fi

      - name: Update issue and close
        if: steps.cmd.outputs.action != 'none'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ACTION: ${{ steps.cmd.outputs.action }}
          REPO: ${{ steps.meta.outputs.repo }}
          VERSION: ${{ steps.meta.outputs.version }}
          APPROVER: ${{ github.event.comment.user.login }}
          ORG: ${{ github.repository_owner }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          TODAY=$(date +%Y-%m-%d)

          if [ "$ACTION" = "approve" ]; then
            COMMENT="**APPROVED** by @${APPROVER} on ${TODAY}\n\nVersion \`${VERSION}\` has been bumped in \`${REPO}\` pyproject.toml on \`staging\`.\nPM workspace-manifest.json \`staging_versions\` updated via version-bump dispatch."
            STATE_REASON="completed"
            NEW_LABEL="major-bump-approved"
          else
            COMMENT="**REJECTED** by @${APPROVER} on ${TODAY}\n\nNo version bump was performed. Issue closed."
            STATE_REASON="not_planned"
            NEW_LABEL="major-bump-rejected"
          fi

          # Add resolution comment
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${ORG}/${ISSUE_REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "{\"body\":\"${COMMENT}\"}" || true

          # Remove major-bump-pending label, add resolution label
          curl -s -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${ORG}/${ISSUE_REPO}/issues/${ISSUE_NUMBER}/labels/major-bump-pending" || true

          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${ORG}/${ISSUE_REPO}/issues/${ISSUE_NUMBER}/labels" \
            -d "{\"labels\":[\"${NEW_LABEL}\"]}" || true

          # Close issue
          curl -s -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${ORG}/${ISSUE_REPO}/issues/${ISSUE_NUMBER}" \
            -d "{\"state\":\"closed\",\"state_reason\":\"${STATE_REASON}\"}" || true

          echo "Issue #${ISSUE_NUMBER} closed as ${STATE_REASON}"

  notify-failure:
    name: Telegram — Major Bump Handler Failure
    needs: [handle-major-bump]
    if: always() && needs.handle-major-bump.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram failure alert
        env:
          TELEGRAM_BOT_TOKEN_PROD: ${{ secrets.TELEGRAM_BOT_TOKEN_PROD }}
          TELEGRAM_BOT_TOKEN_STAGING: ${{ secrets.TELEGRAM_BOT_TOKEN_STAGING }}
          TELEGRAM_BOT_TOKEN_DEV: ${{ secrets.TELEGRAM_BOT_TOKEN_DEV }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_PROD: ${{ vars.TELEGRAM_CHAT_ID_PROD || vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_STAGING: ${{ vars.TELEGRAM_CHAT_ID_STAGING || vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_DEV: ${{ vars.TELEGRAM_CHAT_ID_DEV || vars.TELEGRAM_CHAT_ID }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          case "$GITHUB_REF_NAME" in
            main|live-defi-rollout) TOKEN="${TELEGRAM_BOT_TOKEN_PROD:-${TELEGRAM_BOT_TOKEN:-}}"; CHAT_ID="${TELEGRAM_CHAT_ID_PROD:-}" ;;
            staging)                TOKEN="${TELEGRAM_BOT_TOKEN_STAGING:-${TELEGRAM_BOT_TOKEN:-}}"; CHAT_ID="${TELEGRAM_CHAT_ID_STAGING:-}" ;;
            *)                      TOKEN="${TELEGRAM_BOT_TOKEN_DEV:-${TELEGRAM_BOT_TOKEN:-}}"; CHAT_ID="${TELEGRAM_CHAT_ID_DEV:-}" ;;
          esac
          [ -z "$TOKEN" ] && echo "No bot token — skipping Telegram notify" && exit 0
          [ -z "$CHAT_ID" ] && echo "No chat ID — skipping Telegram notify" && exit 0
          MSG="❌ Major bump handler FAILED — ${{ github.event.repository.name }} (issue #${{ github.event.issue.number }}). View: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" -d "text=${MSG}" -d "disable_web_page_preview=true" || true
