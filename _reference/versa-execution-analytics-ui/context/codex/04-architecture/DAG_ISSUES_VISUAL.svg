  <text x="1220" y="215" class="label">Issue Panel (Current Snapshot)</text>

  <text x="1220" y="255" class="warn">V1 (UCI � UTS via ConfigReloader): appears resolved in code.</text>
  <text x="1220" y="283" class="ok">No active import path found in UCI runtime module.</text>

  <text x="1220" y="332" class="warn">V2: UML (Tier 2) depends on UDC (Tier 3)</text>
  <text x="1220" y="356" class="small">- Found in unified-ml-interface/model_registry.py and pyproject dependency.</text>

  <text x="1220" y="405" class="warn">V3: execution-service service�service deps</text>
  <text x="1220" y="429" class="small">- instruments-service, market-data-tick-handler, risk-and-exposure-service.</text>

  <text x="1220" y="478" class="warn">V4: ml-inference-service � ml-training-service</text>
  <text x="1220" y="502" class="small">- Direct dependency declared in ml-inference pyproject.</text>

  <text x="1220" y="551" class="warn">V5: UTS optional extras include Tier-2 libs + stale naming</text>
  <text x="1220" y="575" class="small">- split-libraries includes unified-market-interface and unified-order-interface.</text>

  <text x="1220" y="624" class="warn">Additional drift:</text>
  <text x="1220" y="648" class="small">- market-tick-data-service � instruments-service</text>
  <text x="1220" y="672" class="small">- workspace-manifest includes market-data-processing-service � market-data-tick-handler</text>
  <text x="1220" y="696" class="small">- Duplicate keys in workspace-manifest for deployment-service/api/ui/system-integration-tests</text>

  <text x="1220" y="748" class="label">Why DAG-first matters</text>
  <text x="1220" y="772" class="small">If these edges remain, test outcomes validate mixed architecture states.</text>
  <text x="1220" y="796" class="small">Resolve boundary graph first, then test to avoid false confidence.</text>

