  <rect x="500" y="720" width="420" height="150" class="box" />
  <text x="520" y="750" class="label">workspace-manifest.json (SSOT)</text>
  <text x="520" y="778" class="small">Detected duplicate repository object keys:</text>
  <text x="520" y="804" class="warn">deployment-service, deployment-api, deployment-ui, system-integration-tests</text>
  <text x="520" y="832" class="small">Impact: ambiguous source of truth for DAG validation and planning.</text>
