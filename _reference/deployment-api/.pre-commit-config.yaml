# Canonical pre-commit config for Python services and API services.
# Template SSOT: unified-trading-pm/scripts/pre-commit-templates/
# Rollout: bash unified-trading-pm/scripts/propagation/rollout-pre-commit-configs.sh
# Setup: pre-commit install --install-hooks

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Conventional commit validation (feat:/fix:/chore:/docs:/refactor:/test:/ci:)
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Ruff - Fast Python linter AND formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        name: Lint with Ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: Format with Ruff

  # Prettier - TypeScript/JSON/Markdown/YAML formatter
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format with Prettier
        types_or: [ts, tsx, javascript, jsx, json, markdown, yaml]
        additional_dependencies:
          - prettier@3.6.2

  # Branch drift check - blocks commit if you're behind origin
  - repo: local
    hooks:
      - id: check-branch-drift
        name: Check branch drift (are you behind origin?)
        entry: bash -c 'HOOK="${WORKSPACE_ROOT:-$(cd "$(git rev-parse --show-toplevel)/.." && pwd)}/unified-trading-pm/scripts/hooks/check-branch-drift.sh"; [ -f "$HOOK" ] && bash "$HOOK" || exit 0'
        language: system
        always_run: true
        pass_filenames: false

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: "^cloudbuild\\.yaml$"
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
