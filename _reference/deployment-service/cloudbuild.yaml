# Cloud Build configuration for Deployment Dashboard (API + UI)
#
# This runs the EXACT same quality gates as:
#   - Local: ./scripts/quality-gates.sh
#   - GitHub Actions: .github/workflows/quality-gates.yml
#
# All three MUST be kept in sync. If you change one, change all three.
#
# This builds and deploys the deployment monitoring dashboard to Cloud Run.
# Triggered automatically on push to main branch.
#
# Prerequisites:
#   1. Artifact Registry repository: deployment-dashboard
#   2. Cloud Run service will be created on first deploy
#   3. Service account with Cloud Run Admin, Storage Admin roles
#
# Manual trigger:
#   gcloud builds submit --config=cloudbuild.yaml --region=asia-northeast1

substitutions:
  _SERVICE_NAME: deployment-dashboard
  # For feature branch builds, set _VERSION_SUFFIX via trigger: +feat.${BRANCH_NAME}.${SHORT_SHA}
  _VERSION_SUFFIX: ""
  _REGION: asia-northeast1
  _ARTIFACT_REPO: deployment-dashboard
  # Resource configuration - adjust based on usage (reduced for regional memory quota)
  _MEMORY: "4Gi" # Reduced for regional memory quota (was 8Gi)
  _CPU: "2" # 2 vCPUs (scaled with memory)
  _MIN_INSTANCES: "0" # 0 = scale to zero to free quota (use 1 to avoid cold starts)
  _MAX_INSTANCES: "10" # Was 20; 4Gi x 10 = 40 Gi peak (was 160 Gi)
  _CONCURRENCY: "200" # Requests per instance before scaling

steps:
  # ============================================================
  # QUALITY GATES - Must pass before Docker build proceeds
  # ============================================================

  # Step 1: Configure Docker auth
  - name: "gcr.io/cloud-builders/gcloud"
    id: "configure-docker"
    args: ["auth", "configure-docker", "${_REGION}-docker.pkg.dev", "--quiet"]
    waitFor: ["-"]

  # Step 2: Build production image (API + UI)
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    waitFor: ["configure-docker"]
    args:
      - "build"
      - "--target"
      - "api"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${COMMIT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"
      - "."

  # Step 3: Build api-dev image (includes dev deps for quality gates)
  - name: "gcr.io/cloud-builders/docker"
    id: "build-dev"
    waitFor: ["build"]
    args:
      - "build"
      - "--target"
      - "api-dev"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:dev"
      - "."

  # Step 4: Run quality gates INSIDE the api-dev image
  - name: "gcr.io/cloud-builders/docker"
    id: "quality-gates"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        echo "Running quality gates inside deployment-dashboard image..."
        docker run --rm \
          --entrypoint "" \
          -e CLOUD_BUILD=true \
          -e CLOUD_MOCK_MODE=true \
          -e GCP_PROJECT_ID=$PROJECT_ID \
          -e GCP_PROJECT_ID=$PROJECT_ID \
          ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:dev \
          /bin/bash -c "scripts/quality-gates.sh --no-fix --quick" || {
          echo "❌ Quality gates failed. Run locally: bash scripts/quality-gates.sh --no-fix"
          exit 1
        }
        echo "✅ Quality gates passed"
    waitFor: ["build-dev"]

  # Step 5: Push image ONLY if quality gates passed
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    waitFor: ["quality-gates"]
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}"

  # Step 6b: Generate env vars file for deploy (avoids Cloud Build 100-args limit)
  - name: "ubuntu"
    id: "gen-env"
    waitFor: ["push"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        cat > /workspace/env.yaml << EOF
        GCP_PROJECT_ID: "${PROJECT_ID}"
        GCS_REGION: "${_REGION}"
        STATE_BUCKET: "deployment-orchestration-${PROJECT_ID}"
        GITHUB_ORG: "IggyIkenna"
        DEPLOYMENT_ENV: "production"
        WORKERS: "4"
        PYTHONUNBUFFERED: "1"
        AUTO_SCHEDULER_MAX_LAUNCH_PER_TICK: "2000"
        AUTO_SCHEDULER_MAX_RELEASES_PER_TICK: "200"
        AUTO_SYNC_ENABLED: "true"
        EOF

  # Step 7: Deploy to Cloud Run with production-grade resources
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    waitFor: ["push", "gen-env"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${COMMIT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--no-allow-unauthenticated" # Requires authentication
      # ----- Resource Configuration -----
      - "--memory"
      - "${_MEMORY}"
      - "--cpu"
      - "${_CPU}"
      - "--cpu-boost" # Faster startup with extra CPU during init
      # ----- Scaling Configuration -----
      - "--min-instances"
      - "${_MIN_INSTANCES}"
      - "--max-instances"
      - "${_MAX_INSTANCES}"
      - "--concurrency"
      - "${_CONCURRENCY}"
      # ----- Timeout Configuration -----
      - "--timeout"
      - "3600" # 1 hour max request timeout
      # ----- Execution Environment -----
      - "--execution-environment"
      - "gen2" # 2nd gen for better performance
      - "--no-cpu-throttling" # Don't throttle CPU between requests
      # ----- GCS FUSE Volume Mount (production only - STATE_BUCKET for deployment orchestration) -----
      # Mount ONLY deployment-orchestration bucket for fast state reads (last 48h of deployments)
      # All domain service buckets (instruments, market-tick, features, ml, etc.) NOT mounted
      # API only needs to read/write deployment state - domain data accessed via GCS API when needed
      - "--add-volume"
      - "name=vol-deployment,type=cloud-storage,bucket=deployment-orchestration-${PROJECT_ID},readonly=false"
      - "--add-volume-mount"
      - "volume=vol-deployment,mount-path=/mnt/gcs/deployment-orchestration-${PROJECT_ID}"
      # ----- Environment Variables (file avoids Cloud Build 100-args limit) -----
      - "--env-vars-file"
      - "/workspace/env.yaml"

  # Step 8: Ensure public access (IAM policy)
  # This is needed because --allow-unauthenticated may be blocked by org policy
  # Note: This may fail if Cloud Build SA doesn't have setIamPolicy permission
  # In that case, run manually: gcloud run services add-iam-policy-binding deployment-dashboard --region=asia-northeast1 --member=allUsers --role=roles/run.invoker
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "set-iam"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run services add-iam-policy-binding ${_SERVICE_NAME} \
          --region=${_REGION} \
          --member=allUsers \
          --role=roles/run.invoker \
        || echo "WARNING: Could not set IAM policy. Service may require manual IAM setup."

  # Store images in Artifact Registry
  # Step: Vulnerability scan — check for CRITICAL CVEs in pushed image
  # Container Analysis scans asynchronously after push; retry for up to 3 min
  - name: "gcr.io/cloud-builders/gcloud"
    id: "scan-check"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        IMAGE="asia-northeast1-docker.pkg.dev/$PROJECT_ID/UNKNOWN/UNKNOWN"
        echo "Waiting for Container Analysis vulnerability scan on $IMAGE..."
        # Poll up to 18 times × 10s = 3 minutes for scan to complete
        for i in $(seq 1 18); do
          RESULT=$(gcloud artifacts docker images describe "$IMAGE" \
            --show-package-vulnerability --format="json" 2>/dev/null)
          if [ -n "$RESULT" ]; then
            CRITICAL=$(echo "$RESULT" | python3 -c "import json,sys;d=json.load(sys.stdin);print(len(d.get('package_vulnerability_summary',{}).get('vulnerabilities',{}).get('CRITICAL',[])))" 2>/dev/null || echo "0")
            if [ "$CRITICAL" != "0" ]; then
              echo "SCAN FAILED: $CRITICAL CRITICAL CVEs found in $IMAGE"
              gcloud artifacts docker images describe "$IMAGE" \
                --show-package-vulnerability --format="table[box](package_vulnerability_summary.vulnerabilities.CRITICAL[].vulnerability,package_vulnerability_summary.vulnerabilities.CRITICAL[].fixedPackage)" 2>/dev/null || true
              exit 1
            fi
            echo "Scan complete: 0 CRITICAL CVEs — image is clean"
            exit 0
          fi
          echo "Scan not ready yet (attempt $i/18) — waiting 10s..."
          sleep 10
        done
        echo "WARNING: Vulnerability scan did not complete within 3 minutes — proceeding (non-blocking)"
        exit 0
    waitFor: ["push"]

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${COMMIT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"

# Build options - use a powerful machine for faster builds
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_32" # Fast builds with 32 vCPUs
  diskSizeGb: 200 # More disk for Docker layer caching

# Timeout for the entire build (30 minutes)
timeout: "600s"
