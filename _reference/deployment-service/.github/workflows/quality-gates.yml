name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    uses: IggyIkenna/unified-trading-pm/.github/workflows/python-quality-gates.yml@live-defi-rollout
    with:
      dep_repos: "deployment-api unified-api-contracts unified-cloud-interface unified-config-interface unified-events-interface unified-internal-contracts unified-trading-library"
    secrets: inherit
