# AWS CodeBuild equivalent of cloudbuild.yaml
# ARCHITECTURE: Test the artifact you deploy
#   1. Build Docker image
#   2. Run quality gates INSIDE the image
#   3. Push ONLY if tests pass
version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "ap-northeast-1"
  exported-variables:
    - IMAGE_TAG

phases:
  install:
    runtime-versions:
      python: "3.13"
    commands:
      - pip install uv
      - VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//') && export VERSION && echo "$VERSION" > VERSION
      - echo "Building version $VERSION"
      - export IMAGE_TAG=$VERSION
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  pre_build:
    commands:
      - REPO_NAME=$(basename $(pwd))
      - ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$REPO_NAME
      - aws ecr describe-repositories --repository-names $REPO_NAME || aws ecr create-repository --repository-name $REPO_NAME

  build:
    commands:
      - VERSION=$(cat VERSION)
      - REPO_NAME=$(basename $(pwd))
      - ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$REPO_NAME
      - docker build -f Dockerfile -t $ECR_REPO:$VERSION -t $ECR_REPO:latest .
      - docker run --rm --entrypoint "" -e CLOUD_BUILD=true -e CLOUD_MOCK_MODE=true -e CLOUD_PROVIDER=aws -e AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION $ECR_REPO:$VERSION /bin/bash -c "scripts/quality-gates.sh --no-fix --quick"
      - docker push $ECR_REPO --all-tags

  post_build:
    commands:
      - VERSION=$(cat VERSION)
      - REPO_NAME=$(basename $(pwd))
      - |
        if [ -n "$GH_PAT" ]; then
          IMAGE="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$REPO_NAME:$VERSION"
          curl -sS -X POST -H "Authorization: token $GH_PAT" -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/IggyIkenna/deployment-service/dispatches \
            -d "{\"event_type\":\"service-deployed\",\"client_payload\":{\"service_name\":\"$REPO_NAME\",\"version\":\"$VERSION\",\"image\":\"$IMAGE\"}}" || true  # || true: cleanup step, failure is intentional (optional GitHub dispatch notification)
        fi
      - uv pip install build twine
      - python -m build --wheel --outdir dist/
      - |
        if [ -n "$CODEARTIFACT_DOMAIN" ]; then
          aws codeartifact login --tool twine --domain $CODEARTIFACT_DOMAIN --domain-owner $AWS_ACCOUNT_ID --repository unified-libraries || true  # || true: cleanup step, failure is intentional (optional publish)
          python -m twine upload --repository codeartifact dist/*.whl || true  # || true: cleanup step, failure is intentional (optional publish)
        fi

artifacts:
  files:
    - "**/*"

cache:
  paths:
    - "/root/.cache/uv/**/*"
